name: Add grant

on:
  workflow_dispatch:
    inputs:
      mode:
        required: true
        type: choice
        description: 'Operation mode: add or edit'
        options:
          - add
          - edit
      payload:
        required: true
        description: 'Grant data as JSON string'

permissions:
  contents: write

jobs:
  add:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add or edit grant
        run: |
          node <<'EOF'
          const fs = require('fs');
          const payload = JSON.parse(process.env.PAYLOAD);
          const mode = process.env.MODE;
          const path = 'data/grants.json';
          const grants = JSON.parse(fs.readFileSync(path, 'utf8'));
          
          if (mode === 'edit') {
            const editIndex = payload.editIndex;
            if (editIndex !== undefined && typeof editIndex === 'number' && editIndex >= 0 && editIndex < grants.length) {
              // Remove editIndex from payload before saving (it's metadata, not grant data)
              const { editIndex: _removed, ...grant } = payload;
              grants[editIndex] = grant;
            } else {
              console.error('Invalid editIndex:', editIndex);
              process.exit(1);
            }
          } else {
            // mode === 'add'
            // Defensively remove editIndex if present (shouldn't be, but ensures clean data)
            const { editIndex: _removed, ...grant } = payload;
            grants.unshift(grant);
          }
          
          fs.writeFileSync(path, JSON.stringify(grants, null, 2));
          EOF
        env:
          MODE: ${{ github.event.inputs.mode }}
          PAYLOAD: ${{ github.event.inputs.payload }}

      - name: Commit
        run: |
          git config user.name "cih-grants-bot"
          git config user.email "cih-grants-bot@users.noreply.github.com"
          git add data/grants.json
          
          TITLE=$(echo '${{ github.event.inputs.payload }}' | jq -r .title)
          MODE="${{ github.event.inputs.mode }}"
          
          if [ "$MODE" = "edit" ]; then
            git commit -m "Edit grant: $TITLE"
          else
            git commit -m "Add grant: $TITLE"
          fi
          
          git push
