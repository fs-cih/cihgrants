name: Add prospect

on:
  workflow_dispatch:
    inputs:
      mode:
        required: true
        type: choice
        description: 'Operation mode: add, edit, or delete'
        options:
          - add
          - edit
          - delete
      payload:
        required: true
        description: 'Prospect data as JSON string'

concurrency:
  group: prospect-modifications
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  add:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add, edit, or delete prospect
        run: |
          node <<'EOF'
          const fs = require('fs');
          const payload = JSON.parse(process.env.PAYLOAD);
          const mode = process.env.MODE;
          const path = 'data/prospects.json';
          const prospects = JSON.parse(fs.readFileSync(path, 'utf8'));
          
          const findIndexForPayload = () => {
            if (payload.id) {
              const indexById = prospects.findIndex(prospect => prospect.id === payload.id);
              if (indexById !== -1) {
                return indexById;
              }
            }
            const editIndex = payload.editIndex;
            if (editIndex !== undefined && typeof editIndex === 'number' && editIndex >= 0 && editIndex < prospects.length) {
              return editIndex;
            }
            return -1;
          };

          if (mode === 'edit') {
            const targetIndex = findIndexForPayload();
            if (targetIndex !== -1) {
              // Remove editIndex from payload before saving (it's metadata, not prospect data)
              const { editIndex: _removed, ...prospect } = payload;
              prospects[targetIndex] = prospect;
            } else {
              console.error('Could not find prospect to edit using id/editIndex:', payload.id, payload.editIndex);
              process.exit(1);
            }
          } else if (mode === 'delete') {
            const targetIndex = findIndexForPayload();
            if (targetIndex !== -1) {
              prospects.splice(targetIndex, 1);
            } else {
              console.error('Could not find prospect to delete using id/editIndex:', payload.id, payload.editIndex);
              process.exit(1);
            }
          } else {
            // mode === 'add'
            // Defensively remove editIndex if present (shouldn't be, but ensures clean data)
            const { editIndex: _removed, ...prospect } = payload;
            prospects.unshift(prospect);
          }
          
          fs.writeFileSync(path, JSON.stringify(prospects, null, 2));
          EOF
        env:
          MODE: ${{ github.event.inputs.mode }}
          PAYLOAD: ${{ github.event.inputs.payload }}

      - name: Commit
        run: |
          git config user.name "cih-grants-bot"
          git config user.email "cih-grants-bot@users.noreply.github.com"
          git add data/prospects.json
          
          FUNDER=$(echo '${{ github.event.inputs.payload }}' | jq -r .funder)
          MODE="${{ github.event.inputs.mode }}"
          
          if [ "$MODE" = "edit" ]; then
            git commit -m "Edit prospect: $FUNDER"
          elif [ "$MODE" = "delete" ]; then
            git commit -m "Delete prospect: $FUNDER"
          else
            git commit -m "Add prospect: $FUNDER"
          fi
          
          git pull --rebase origin main
          git push
