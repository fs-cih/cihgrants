<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CIH Grant Opportunities Tracker</title>
  <link rel="stylesheet" href="files.css" />
</head>
<body>
  <header class="page">
    <div class="topbar">
      <div class="title-row">
        <div>
          <h1>CIH Grant Opportunities Tracker</h1>
        </div>
        <div style="display: flex; gap: 8px;">
          <button id="refreshBtn" class="icon-btn" title="Refresh data from server" aria-label="Refresh data">⟳</button>
          <button id="adminPlus" class="icon-btn" title="Add grant" aria-label="Add grant">＋</button>
        </div>
      </div>

      <section class="controls" aria-label="Filter and sort grants">
        <h2>Filter Results</h2>

        <div class="filter-grid">
          <div class="filter-row">
            <label class="filter-label">Search:</label>
            <div class="filter-control">
              <input id="q" class="control" type="search" placeholder="Search title, description, or keywords…" />
            </div>
          </div>

          <div class="filter-row">
            <label class="filter-label">Funder Type:</label>
            <div class="filter-control">
              <div id="funderTypeCheckboxes" class="checkbox-group"></div>
            </div>
          </div>

          <div class="filter-row">
            <label class="filter-label">Eligibility:</label>
            <div class="filter-control">
              <div id="eligibilityCheckboxes" class="checkbox-group"></div>
            </div>
          </div>

          <div class="filter-row">
            <label class="filter-label">Flagged for PI:</label>
            <div class="filter-control">
              <select id="flagForPi" class="control"></select>
            </div>
          </div>

          <div class="filter-row">
            <label class="filter-label filter-label-top">Keywords:</label>
            <div class="filter-control">
              <div id="keywordPills" class="keyword-pills"></div>
            </div>
          </div>

          <div class="filter-row">
            <div class="filter-label"></div>
            <div class="filter-control">
              <button id="clearFilters" class="btn btn-small">Clear</button>
            </div>
          </div>
        </div>

        <span id="resultCount" class="meta"></span>
      </section>
    </div>
  </header>

  <main class="page">
    <div id="list" class="grant-list"></div>
  </main>

  <div class="version">Version 1.7</div>

  <dialog id="adminDialog">
    <form method="dialog" id="adminForm">
      <h2 id="adminDialogTitle">Add Grant</h2>

      <label>GitHub Personal Access Token
        <input id="a_token" class="control" type="password" autocomplete="off" placeholder="github_pat_...">
        <small style="display: block; margin-top: 4px; color: #666;">
          Required scopes: <code>workflow</code> + <code>repo</code> (Classic) or Actions: Read and write (Fine-grained). 
          <a href="https://github.com/settings/tokens" target="_blank" rel="noopener" style="color: #0969da;">Create token →</a>
        </small>
      </label>

      <label>Title<input id="a_title" class="control" required></label>
      <label>Funder Type<select id="a_funderType" class="control"></select></label>
      <label>Eligibility<select id="a_eligibility" class="control"></select></label>
      <label>Amount (USD)<input id="a_amount" class="control" type="number" min="0"></label>
      <label>Amount Detail<select id="a_amountDetail" class="control"></select></label>
      <label>Amount Tracking<select id="a_amountIdc" class="control"></select></label>
      <label>Duration<input id="a_duration" class="control" placeholder="e.g., 2 years"></label>
      <label>Added Date<input id="a_addedDate" class="control" type="date"></label>
      
      <label>Deadline Type
        <div style="display: flex; gap: 12px; padding: 8px 0;">
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
            <input type="radio" name="deadlineType" value="deadline" id="a_deadlineType_deadline" checked>
            <span>Deadline</span>
          </label>
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
            <input type="radio" name="deadlineType" value="open" id="a_deadlineType_open">
            <span>Open</span>
          </label>
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
            <input type="radio" name="deadlineType" value="recurring" id="a_deadlineType_recurring">
            <span>Recurring</span>
          </label>
        </div>
      </label>
      
      <label id="a_deadlines_label">Deadlines (comma-separated YYYY-MM-DD)
        <input id="a_deadlines" class="control" required>
      </label>
      <label id="a_deadlineRecurring_label" style="display: none;">Recurring Deadline Description
        <input id="a_deadlineRecurring" class="control" placeholder="e.g., First Monday of each month">
      </label>
      <label>Geography Restriction<select id="a_geography" class="control"></select></label>
      <label>PI Restriction<select id="a_piRestriction" class="control"></select></label>
      <label>RFA Link<input id="a_link" class="control" required></label>
      <label>Description<textarea id="a_description" class="control" rows="5"></textarea></label>
      <label>Keywords<select id="a_keywords" class="control" multiple></select></label>
      <label>Flag for PI<select id="a_flagForPi" class="control" multiple></select></label>

      <div class="dialog-actions">
        <button id="saveBtn" class="btn primary" type="button">Save</button>
        <button id="cancelBtn" class="btn" type="button">Cancel</button>
        <button id="deleteBtn" class="btn danger" type="button" hidden>Delete</button>
      </div>

      <p id="adminStatus" class="status"></p>
    </form>
  </dialog>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
