<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CIH Grant Opportunities Database</title>
  <link rel="stylesheet" href="files.css" />
</head>
<body>
  <header class="page">
    <div class="topbar">
      <div class="title-row">
        <div>
          <h1>CIH Grant Opportunities Database</h1>
        </div>
        <div style="display: flex; gap: 8px; align-items: center;">
          <div class="toggle-container">
            <button id="toggleGrants" class="toggle-btn active">Grants</button>
            <button id="toggleProspects" class="toggle-btn">Prospects</button>
            <div class="toggle-slider"></div>
          </div>
          <button id="downloadBtn" class="icon-btn-circle" title="Download" aria-label="Download">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
          </button>
          <button id="adminPlus" class="icon-btn-circle" title="Add" aria-label="Add">＋</button>
        </div>
      </div>

      <section class="controls" aria-label="Filter and sort grants">
        <h2>Filter Results</h2>

        <div class="filter-grid">
          <div class="filter-row">
            <label class="filter-label">Search:</label>
            <div class="filter-control">
              <input id="q" class="control" type="search" placeholder="Search title, description, or keywords…" />
            </div>
          </div>

          <div class="filter-row">
            <label class="filter-label">Funder Type:</label>
            <div class="filter-control">
              <div id="funderTypeCheckboxes" class="checkbox-group"></div>
            </div>
          </div>

          <div class="filter-row" id="eligibilityFilterRow">
            <label class="filter-label">Eligibility:</label>
            <div class="filter-control">
              <div id="eligibilityCheckboxes" class="checkbox-group"></div>
            </div>
          </div>

          <div class="filter-row">
            <label class="filter-label filter-label-top">Keywords:</label>
            <div class="filter-control">
              <div id="keywordPills" class="keyword-pills"></div>
            </div>
          </div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: flex-start; gap: 8px; margin-top: 12px;">
          <span id="resultCount" class="meta"></span>
          <button id="clearFilters" class="btn btn-small">Clear</button>
        </div>
      </section>
    </div>
  </header>

  <main class="page">
    <div id="list" class="grant-list"></div>
  </main>

  <dialog id="adminDialog">
    <form method="dialog" id="adminForm">
      <h2 id="adminDialogTitle">Add Grant</h2>

      <label>GitHub Personal Access Token
        <input id="a_token" class="control" type="password" autocomplete="off" placeholder="github_pat_...">
        <small style="display: block; margin-top: 4px; color: #666;">
          Required scopes: <code>workflow</code> + <code>repo</code> (Classic) or Actions: Read and write (Fine-grained). 
          <a href="https://github.com/settings/tokens" target="_blank" rel="noopener" style="color: #0969da;">Create token →</a>
        </small>
      </label>

      <label>Pin
        <div style="display: flex; gap: 12px; padding: 8px 0;">
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
            <input type="radio" name="pin" value="no" id="a_pin_no" checked>
            <span>No</span>
          </label>
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
            <input type="radio" name="pin" value="yes" id="a_pin_yes">
            <span>Yes</span>
          </label>
        </div>
      </label>

      <label>Title<input id="a_title" class="control" required></label>
      <label>Funder Type<select id="a_funderType" class="control"></select></label>
      <label id="a_federalAgency_label" style="display: none;">Federal Agency<select id="a_federalAgency" class="control"></select></label>
      <label>Eligibility<select id="a_eligibility" class="control"></select></label>
      <label>Amount (USD)<input id="a_amount" class="control" type="number" min="0"></label>
      <label>Amount Detail<select id="a_amountDetail" class="control"></select></label>
      <label>Amount Tracking<select id="a_amountIdc" class="control"></select></label>
      <label>Duration<input id="a_duration" class="control" placeholder="e.g., 2 years"></label>
      <label>Added Date<input id="a_addedDate" class="control" type="date"></label>
      
      <label>Deadline Type
        <div style="display: flex; gap: 12px; padding: 8px 0;">
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
            <input type="radio" name="deadlineType" value="deadline" id="a_deadlineType_deadline" checked>
            <span>Deadline</span>
          </label>
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
            <input type="radio" name="deadlineType" value="open" id="a_deadlineType_open">
            <span>Open</span>
          </label>
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
            <input type="radio" name="deadlineType" value="recurring" id="a_deadlineType_recurring">
            <span>Recurring</span>
          </label>
        </div>
      </label>
      
      <label id="a_deadlines_label">Deadlines (comma-separated YYYY-MM-DD)
        <input id="a_deadlines" class="control" required>
      </label>
      <label id="a_deadlineRecurring_label" style="display: none;">Recurring Deadline Description
        <input id="a_deadlineRecurring" class="control" placeholder="e.g., First Monday of each month">
      </label>
      <label>Geography Restriction<select id="a_geography" class="control"></select></label>
      <label>PI Restriction<select id="a_piRestriction" class="control"></select></label>
      <label>RFA Link<input id="a_link" class="control" required></label>
      <label>Description<textarea id="a_description" class="control" rows="5"></textarea></label>
      <label>Keywords<select id="a_keywords" class="control" multiple></select></label>

      <label>Nest Grant?
        <select id="a_parentGrantId" class="control">
          <option value="">None (standalone grant)</option>
        </select>
        <small style="display: block; margin-top: 4px; color: #666;">
          Select a parent grant to nest this grant under it. Nested grants appear within the parent grant card.
        </small>
      </label>

      <div class="dialog-actions">
        <button id="saveBtn" class="btn primary" type="button">Save</button>
        <button id="cancelBtn" class="btn" type="button">Cancel</button>
        <button id="deleteBtn" class="btn danger" type="button" hidden>Delete</button>
      </div>

      <p id="adminStatus" class="status"></p>
    </form>
  </dialog>

  <dialog id="prospectDialog">
    <form method="dialog" id="prospectForm">
      <h2 id="prospectDialogTitle">Add Prospect</h2>

      <label>GitHub Personal Access Token
        <input id="p_token" class="control" type="password" autocomplete="off" placeholder="github_pat_...">
        <small style="display: block; margin-top: 4px; color: #666;">
          Required scopes: <code>workflow</code> + <code>repo</code> (Classic) or Actions: Read and write (Fine-grained). 
          <a href="https://github.com/settings/tokens" target="_blank" rel="noopener" style="color: #0969da;">Create token →</a>
        </small>
      </label>

      <label>Pin
        <div style="display: flex; gap: 12px; padding: 8px 0;">
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
            <input type="radio" name="p_pin" value="no" id="p_pin_no" checked>
            <span>No</span>
          </label>
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
            <input type="radio" name="p_pin" value="yes" id="p_pin_yes">
            <span>Yes</span>
          </label>
        </div>
      </label>

      <label>Funder<input id="p_funder" class="control" required></label>
      <label>Funder Type<select id="p_funderType" class="control"></select></label>
      <label>Geography Restriction<select id="p_geography" class="control"></select></label>
      <label>PI Restriction<select id="p_piRestriction" class="control"></select></label>
      
      <label>Invitation Only
        <div style="display: flex; gap: 12px; padding: 8px 0;">
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
            <input type="radio" name="p_invitationOnly" value="no" id="p_invitationOnly_no" checked>
            <span>No</span>
          </label>
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
            <input type="radio" name="p_invitationOnly" value="yes" id="p_invitationOnly_yes">
            <span>Yes</span>
          </label>
        </div>
      </label>
      
      <label>Website Link<input id="p_link" class="control" type="url" required></label>
      <label>Keywords<select id="p_keywords" class="control" multiple></select></label>
      <label>Notes<textarea id="p_notes" class="control" rows="5"></textarea></label>
      
      <h3 style="margin-top: 24px; margin-bottom: 12px; font-size: 1rem; color: #631500;">Additional Links</h3>
      
      <label>Hyperlink 1
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 8px; margin-top: 4px;">
          <input id="p_hyperlink1_text" class="control" placeholder="Pill Text">
          <input id="p_hyperlink1_url" class="control" type="url" placeholder="Hyperlink">
        </div>
      </label>
      
      <label>Hyperlink 2
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 8px; margin-top: 4px;">
          <input id="p_hyperlink2_text" class="control" placeholder="Pill Text">
          <input id="p_hyperlink2_url" class="control" type="url" placeholder="Hyperlink">
        </div>
      </label>
      
      <label>Hyperlink 3
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 8px; margin-top: 4px;">
          <input id="p_hyperlink3_text" class="control" placeholder="Pill Text">
          <input id="p_hyperlink3_url" class="control" type="url" placeholder="Hyperlink">
        </div>
      </label>
      
      <label>Hyperlink 4
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 8px; margin-top: 4px;">
          <input id="p_hyperlink4_text" class="control" placeholder="Pill Text">
          <input id="p_hyperlink4_url" class="control" type="url" placeholder="Hyperlink">
        </div>
      </label>
      
      <label>Hyperlink 5
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 8px; margin-top: 4px;">
          <input id="p_hyperlink5_text" class="control" placeholder="Pill Text">
          <input id="p_hyperlink5_url" class="control" type="url" placeholder="Hyperlink">
        </div>
      </label>

      <div class="dialog-actions">
        <button id="prospectSaveBtn" class="btn primary" type="button">Save</button>
        <button id="prospectCancelBtn" class="btn" type="button">Cancel</button>
        <button id="prospectDeleteBtn" class="btn danger" type="button" hidden>Delete</button>
      </div>

      <p id="prospectStatus" class="status"></p>
    </form>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
